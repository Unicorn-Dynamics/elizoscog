version: '3.8'

services:
  # Service Discovery Registry
  service-registry:
    build:
      context: ../..
      dockerfile: docker/microservices/Dockerfile
      target: discovery
    container_name: elizoscog-service-registry
    ports:
      - "8001:8001"
    environment:
      - SERVICE_TYPE=registry
      - SERVICE_PORT=8001
      - CLEANUP_INTERVAL=60
      - SERVICE_TIMEOUT=30
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - elizoscog-mesh
    restart: unless-stopped

  # Load Balancer
  load-balancer:
    build:
      context: ../..
      dockerfile: docker/microservices/Dockerfile  
      target: loadbalancer
    container_name: elizoscog-load-balancer
    ports:
      - "8002:8002"
    environment:
      - SERVICE_TYPE=loadbalancer
      - SERVICE_PORT=8002
      - REGISTRY_URL=http://service-registry:8001
    depends_on:
      service-registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - elizoscog-mesh
    restart: unless-stopped

  # Service Orchestrator
  orchestrator:
    build:
      context: ../..
      dockerfile: docker/microservices/Dockerfile
      target: orchestrator
    container_name: elizoscog-orchestrator
    ports:
      - "8003:8003"
    environment:
      - SERVICE_TYPE=orchestrator
      - SERVICE_PORT=8003
      - REGISTRY_URL=http://service-registry:8001
      - HEALTH_CHECK_INTERVAL=30
    depends_on:
      service-registry:
        condition: service_healthy
      load-balancer:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 60s
      timeout: 15s
      retries: 3
    networks:
      - elizoscog-mesh
    restart: unless-stopped

  # Financial Analysis Service
  financial-service:
    build:
      context: ../..
      dockerfile: docker/microservices/Dockerfile
      target: production
    container_name: elizoscog-financial-service
    ports:
      - "8010:8010"
    environment:
      - SERVICE_TYPE=financial
      - SERVICE_NAME=financial-analysis
      - SERVICE_PORT=8010
      - REGISTRY_URL=http://service-registry:8001
    depends_on:
      service-registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - elizoscog-mesh
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 1G
          cpus: "0.5"

  # OpenCog Reasoning Service
  reasoning-service:
    build:
      context: ../..
      dockerfile: docker/microservices/Dockerfile
      target: production
    container_name: elizoscog-reasoning-service
    ports:
      - "8011:8011"
    environment:
      - SERVICE_TYPE=reasoning
      - SERVICE_NAME=cognitive-reasoning
      - SERVICE_PORT=8011
      - REGISTRY_URL=http://service-registry:8001
    depends_on:
      service-registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8011/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - elizoscog-mesh
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"

  # GGML ML Service
  ggml-service:
    build:
      context: ../..
      dockerfile: docker/microservices/Dockerfile
      target: ggml
    container_name: elizoscog-ggml-service
    ports:
      - "8012:8012"
    environment:
      - SERVICE_TYPE=ggml
      - SERVICE_NAME=ml-inference
      - SERVICE_PORT=8012
      - REGISTRY_URL=http://service-registry:8001
      - MODEL_TYPE=llama
      - QUANTIZATION=q4_0
      - CONTEXT_LENGTH=2048
    depends_on:
      service-registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8012/health"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 120s
    networks:
      - elizoscog-mesh
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"

  # Envoy Proxy for Service Mesh
  envoy-proxy:
    image: envoyproxy/envoy:v1.28-latest
    container_name: elizoscog-envoy
    ports:
      - "10000:10000"  # Main listener
      - "9901:9901"    # Admin interface
    volumes:
      - ./configs/envoy.yaml:/etc/envoy/envoy.yaml:ro
    command: /usr/local/bin/envoy -c /etc/envoy/envoy.yaml
    depends_on:
      - service-registry
      - financial-service
      - reasoning-service
      - ggml-service
    networks:
      - elizoscog-mesh
    restart: unless-stopped

  # Traefik Alternative Proxy
  traefik-proxy:
    image: traefik:v3.0
    container_name: elizoscog-traefik
    ports:
      - "80:80"     # HTTP entrypoint
      - "8080:8080" # Traefik dashboard
    volumes:
      - ./configs/traefik-static.yml:/etc/traefik/traefik.yml:ro
      - ./configs/traefik-dynamic.yml:/etc/traefik/dynamic.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - service-registry
      - financial-service
      - reasoning-service
      - ggml-service
    networks:
      - elizoscog-mesh
    restart: unless-stopped
    profiles:
      - traefik

  # Monitoring with Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: elizoscog-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - elizoscog-mesh
    restart: unless-stopped
    profiles:
      - monitoring

  # Grafana for Visualization
  grafana:
    image: grafana/grafana:latest
    container_name: elizoscog-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - elizoscog-mesh
    restart: unless-stopped
    profiles:
      - monitoring

networks:
  elizoscog-mesh:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  grafana-data: